<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    background: #0D1117;
    color: #E8EDF5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    max-width: 640px;
    width: 100%;
  }
  .label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #00C7B1;
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 2.5rem;
    color: #E8EDF5;
  }
  .cards {

  .card {

  }
  .card:hover {
    border-color: #00C7B1;
    transform: translateY(-2px);
  }
  .card-tag {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #00C7B1;
    margin-bottom: 0.5rem;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #E8EDF5;
    margin-bottom: 0.4rem;
  }
  .card-desc {
    font-size: 0.82rem;
    color: #8FA3BF;
    line-height: 1.6;
  }
  .card-arrow {
    float: right;
    color: #4D6480;
    font-size: 1rem;
    margin-left: 1rem;
    transition: color 0.2s;
  }
  .card:hover .card-arrow {
    color: #00C7B1;
  }
</style>
</head>
